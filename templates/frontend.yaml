# agent-cli stack: frontend (typescript/react)
agents:
  - name: gemini
    path: ".mcp.json"
    format: "standard"
  - name: vscode
    path: ".vscode/settings.json"
    format: "vscode"
  - name: claude
    path: "~/.config/Claude/claude_desktop_config.json"
    format: "standard"
  - name: cursor
    path: ".cursor/mcp.json"
    format: "standard"

servers:
  shadcn:
    command: "pnpm"
    args: ["dlx", "shadcn@latest", "mcp"]
  puppeteer:
    command: "pnpm"
    args: ["dlx", "@modelcontextprotocol/server-puppeteer"]
  context7:
    command: "npx"
    args: ["-y", "@upstash/context7-mcp"]
  github:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "set-me"

# Optional servers:
#   playwright:
#     command: "npx"
#     args: ["-y", "@playwright/mcp"]

